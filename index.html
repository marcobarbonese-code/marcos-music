<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Marco's Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8c547;
    --accent2: #e87547;
    --text: #f0eeea;
    --muted: #7a7a8a;
    --red: #e84747;
    --radius: 12px;
  }

  :root.light {
    --bg: #f4f2ee;
    --surface: #eae7e1;
    --card: #ffffff;
    --border: #d4cfc6;
    --accent: #c9a227;
    --accent2: #c96327;
    --text: #1a1814;
    --muted: #8a8478;
    --red: #c93030;
  }

  /* ── THEME TOGGLE ── */
  #btn-theme {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 9px;
    cursor: pointer;
    color: var(--text);
    display: flex; align-items: center;
    transition: all .2s;
  }
  #btn-theme:hover { border-color: var(--accent); color: var(--accent); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
    white-space: nowrap;
  }
  .logo span { color: var(--accent2); }
  .header-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }
  .count-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .count-badge b { color: var(--accent); }

  /* ── SYNC BAR ── */
  #sync-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    position: fixed;
    top: 52px;
    left: 0; right: 0;
    z-index: 98;
  }
  #sync-bar.hidden { display: none; }
  #dropbox-input {
    flex: 1; min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
  }
  #dropbox-input:focus { outline: none; border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .btn.secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.danger { background: var(--red); color: #fff; }
  #sync-status {
    font-size: 12px;
    color: var(--muted);
    width: 100%;
  }
  #sync-status.ok { color: #5ecb82; }
  #sync-status.err { color: var(--red); }

  /* ── SEARCH / FILTERS ── */
  #toolbar {
    padding: 8px 16px;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bg);
    position: sticky; top: 118px; z-index: 90;
    border-bottom: 1px solid var(--border);
  }
  .filter-row {
    display: flex; gap: 8px; width: 100%;
  }
  .filter-row select {
    flex: 1;
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 180px;
  }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }
  #search-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px;
    display: none; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: color .15s;
  }
  #search-clear:hover { color: var(--text); }
  #search-clear.visible { display: flex; }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 32px 9px 32px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }

  /* Search type pills */
  .search-pills {
    display: flex; gap: 4px; width: 100%; flex-wrap: wrap;
  }
  .pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
  }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }

  /* ── GRID ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    padding: 16px;
  }

  .film-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
  }
  .film-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 24px rgba(232,197,71,0.15);
  }
  .film-poster {
    width: 100%; aspect-ratio: 2/3;
    object-fit: cover;
    background: var(--surface);
    display: block;
  }
  .film-poster-placeholder {
    width: 100%; aspect-ratio: 2/3;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    color: var(--border);
  }
  .film-info {
    padding: 8px 10px 10px;
  }
  .film-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .film-meta {
    font-size: 11px;
    color: var(--muted);
  }
  .film-rating {
    position: absolute; top: 8px; right: 8px;
    background: rgba(10,10,15,0.85);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
  }

  /* ── MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    overflow-y: auto;
    padding: 20px 16px;
  }
  #modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  #modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%; max-width: 520px;
    overflow: hidden;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-poster-wrap {
    position: relative;
    height: 260px;
    overflow: hidden;
  }
  #modal-poster {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .modal-poster-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, var(--card) 100%);
  }
  .modal-body { padding: 16px 20px 24px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .modal-orig {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    font-style: italic;
  }
  .modal-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .tag {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .tag.accent { background: rgba(232,197,71,0.12); border-color: rgba(232,197,71,0.3); color: var(--accent); }
  .modal-synopsis {
    font-size: 13px;
    line-height: 1.6;
    color: #c0bebb;
    margin-bottom: 16px;
  }
  .modal-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .modal-people {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex; gap: 8px; margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  #modal-close {
    position: absolute; top: 14px; right: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: border-color .15s, color .15s, background .15s;
  }
  #modal-close:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--card);
  }

  /* ── EDIT FORM ── */
  /* ── POSTER GALLERY ── */
  .poster-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    margin-top: 4px;
  }
  .poster-thumb {
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .15s, transform .15s;
    width: 100%;
    background: var(--surface);
  }
  .poster-thumb:hover {
    border-color: var(--accent);
    transform: scale(1.03);
  }
  .poster-thumb-error {
    aspect-ratio: 2/3;
    background: var(--surface);
    border-radius: 8px;
    border: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; text-align: center;
    padding: 8px;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.95);
    align-items: center; justify-content: center;
    flex-direction: column;
    padding: 20px;
  }
  #lightbox.open { display: flex; }
  #lightbox-img {
    max-width: 100%; max-height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #lightbox-nav {
    display: flex; align-items: center; gap: 20px;
    margin-top: 16px;
  }
  #lightbox-nav button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 40px; height: 40px;
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    font-size: 18px;
  }
  #lightbox-nav button:hover { background: rgba(255,255,255,0.2); }
  #lightbox-counter {
    color: rgba(255,255,255,0.6);
    font-size: 13px; min-width: 60px; text-align: center;
  }
  #lightbox-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 36px; height: 36px;
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  #lightbox-close:hover { background: rgba(255,255,255,0.25); }

  /* ── TRAILER BUTTON ── */
  .btn-trailer {
    display: inline-flex; align-items: center; justify-content: center;
    background: #e00;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity .2s, transform .2s;
    flex-shrink: 0;
  }
  .btn-trailer:hover { opacity: .85; transform: scale(1.1); }

  .director-link {
    cursor: pointer;
    border-bottom: 1px dashed var(--accent);
    color: var(--accent);
    transition: opacity .15s;
  }
  .director-link:hover { opacity: .75; }
  .form-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; display: block; }
  .form-input, .form-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
  }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  /* ── LOADING ── */
  #loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 14px; }

  /* ── EMPTY ── */
  #empty {
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    min-height: 40vh; gap: 8px; color: var(--muted);
  }
  #empty .icon { font-size: 48px; }

  /* ── ADD FILM BUTTON ── */
  #fab {
    position: fixed; bottom: 24px; right: 20px; z-index: 150;
    width: 52px; height: 52px;
    background: var(--accent);
    border: none; border-radius: 50%;
    font-size: 24px; cursor: pointer;
    box-shadow: 0 4px 20px color-mix(in srgb, var(--accent) 40%, transparent);
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, box-shadow .3s;
  }
  #fab:hover { transform: scale(1.1); }
  #fab.hidden { display: none; }

  /* ── PROGRESS BAR ── */
  #progress-bar {
    position: fixed; top: 0; left: 0; z-index: 999;
    height: 3px; background: var(--accent);
    width: 0; transition: width .3s;
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 400px) {
    #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }

  /* ── MODE SWITCHER BAR ── */
  #mode-bar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px;
    height: 66px;
    display: flex; align-items: center; justify-content: center;
    position: sticky; top: 52px; z-index: 95;
  }
  .mode-switcher {
    display: flex;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .mode-btn {
    flex: 1;
    background: none;
    border: none;
    border-radius: 9px;
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .mode-btn.active.films { color: var(--accent); }
  .mode-btn.active.cartoons { color: #7eb8f7; }
  .mode-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.8;
  }

  /* ── GENRE FILTER POPUP ── */
  #genre-popup {
    display: none;
    position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
    padding-bottom: 0;
  }
  #genre-popup.open { display: flex; }
  #genre-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    width: 100%; max-width: 520px;
    padding: 20px 16px 32px;
    animation: slideUp .22s ease;
  }
  #genre-panel h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #genre-panel h3 button {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center;
  }
  .genre-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
    max-height: 75vh; overflow-y: auto;
  }
  .genre-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  .genre-chip:hover {
    background: var(--card);
    border-color: var(--muted);
  }
  .genre-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }
  .genre-chip.active:hover {
    opacity: .85;
  }
  .genre-chip.reset {
    border-color: var(--muted);
    color: var(--muted);
  }
  .genre-chip.reset.active {
    background: var(--surface);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  .genre-chip.reset {
    border-color: var(--muted);
    color: var(--muted);
  }

  /* ── YEAR FILTER POPUP ── */
  #year-popup {
    display: none;
    position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
    padding-bottom: 0;
  }
  #year-popup.open { display: flex; }
  #year-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    width: 100%; max-width: 520px;
    padding: 20px 16px 32px;
    animation: slideUp .22s ease;
  }
  #year-panel h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #year-panel h3 button {
    background: none; border: none; color: var(--muted);
    cursor: pointer; display: flex; align-items: center;
  }
  #year-panel .genre-grid {
    max-height: 75vh; overflow-y: auto;
  }

  /* ── SORT POPUP ── */
  #sort-popup {
    display: none;
    position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
    padding-bottom: 0;
  }
  #sort-popup.open { display: flex; }
  #sort-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    width: 100%; max-width: 520px;
    padding: 20px 16px 32px;
    animation: slideUp .22s ease;
  }
  #sort-panel h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #sort-panel h3 button {
    background: none; border: none; color: var(--muted);
    cursor: pointer; display: flex; align-items: center;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- HEADER -->
<header>
  <div class="logo" id="header-logo">MARCO'S <span>FILMS</span></div>
  <div class="header-right">
    <div class="count-badge"><b id="count">0</b> <span id="count-label">film</span></div>
    <button id="btn-theme" onclick="toggleTheme()" title="Cambia tema">
      <svg id="icon-dark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="icon-light" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="btn secondary" onclick="toggleSyncBar()" style="padding:7px 10px;font-size:12px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg></button>
  </div>
</header>

<!-- MODE SWITCHER BAR -->
<div id="mode-bar">
  <div class="mode-switcher">
    <button class="mode-btn films active" id="mode-films" onclick="switchMode('films')">
      <span class="mode-dot"></span> Film
    </button>
    <button class="mode-btn cartoons" id="mode-cartoons" onclick="switchMode('cartoons')">
      <span class="mode-dot"></span> Cartoon
    </button>
  </div>
</div>

<!-- SYNC BAR -->
<div id="sync-bar">
  <div id="auth-section" style="width:100%;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <button class="btn" id="btn-login" onclick="dropboxLogin()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Connetti Dropbox</button>
    <button class="btn secondary" onclick="loadFromFile()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> File locale</button>
    <input type="file" id="file-input" accept=".data,.sqlite,.db" style="display:none" onchange="handleFileUpload(event)">
    <span style="font-size:12px;color:var(--muted)">oppure scegli un file dal tuo dispositivo</span>
  </div>
  <div id="dropbox-section" style="width:100%;display:none;flex-wrap:wrap;gap:8px;align-items:center">
    <span id="dropbox-user" style="font-size:13px;color:var(--accent)"></span>
    <button class="btn secondary" id="btn-pick" onclick="dropboxPickFile()" style="background:var(--accent);color:#000;border-color:var(--accent)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 17 15 14"/></svg> Scegli file .data</button>
    <button class="btn secondary" onclick="saveToDropbox()" id="btn-save" style="display:none;gap:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><line x1="12" y1="13" x2="12" y2="19"/><polyline points="9 16 12 19 15 16"/></svg> Salva su Dropbox</button>
    <button class="btn danger" style="padding:7px 10px;font-size:12px" onclick="dropboxLogout()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Disconnetti</button>
  </div>
  <div id="sync-status"></div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="search-wrap">
    <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input id="search" type="text" placeholder="Cerca film, regista, attore..." oninput="doSearch(); toggleClearBtn()" onblur="this.blur()">
    <button id="search-clear" onclick="clearSearch()" tabindex="-1"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="filter-row">
    <button class="btn secondary" onclick="openSortPopup()" id="btn-sort" style="padding:8px 12px;font-size:13px;gap:6px;display:inline-flex;align-items:center;flex:1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
      <span id="btn-sort-label">A-Z</span>
    </button>
    <button class="btn secondary" onclick="openGenrePopup()" id="btn-genre" style="padding:8px 12px;font-size:13px;gap:6px;display:inline-flex;align-items:center;flex:1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      <span id="btn-genre-label">Genere</span>
    </button>
    <button class="btn secondary" onclick="openYearPopup()" id="btn-year" style="padding:8px 12px;font-size:13px;gap:6px;display:inline-flex;align-items:center;flex:1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="btn-year-label">Anno</span>
    </button>
  </div>
</div>

<!-- GENRE POPUP -->
<div id="genre-popup" onclick="closeGenrePopupIfOutside(event)">
  <div id="genre-panel">
    <h3>Filtra per genere <button onclick="closeGenrePopup()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></h3>
    <div class="genre-grid" id="genre-grid"></div>
  </div>
</div>

<!-- YEAR POPUP -->
<div id="year-popup" onclick="closeYearPopupIfOutside(event)">
  <div id="year-panel">
    <h3>Filtra per anno <button onclick="closeYearPopup()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></h3>
    <div class="genre-grid" id="year-grid"></div>
  </div>
</div>

<!-- SORT POPUP -->
<div id="sort-popup" onclick="closeSortPopupIfOutside(event)">
  <div id="sort-panel">
    <h3>Ordina per <button onclick="closeSortPopup()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></h3>
    <div class="genre-grid" id="sort-grid"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<main>
  <div id="loading">
    <div class="spinner"></div>
    <p>Carica il database dal link Dropbox o da file locale</p>
  </div>
  <div id="empty"><div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg></div><p>Nessun film trovato</p></div>
  <div id="grid"></div>
</main>

<!-- FAB -->
<button id="fab" class="hidden" onclick="openAddModal()" title="Aggiungi film"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModalIfOutside(event)">
  <div id="modal" style="position:relative">
    <div id="modal-content"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightboxIfOutside(event)">
  <button id="lightbox-close" onclick="closeLightbox()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-nav">
    <button onclick="lightboxStep(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span id="lightbox-counter"></span>
    <button onclick="lightboxStep(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let DB = null;
let SQL = null;
let allFilms = [];
let affiches = {};
let searchField = 'all';
let currentEditId = null;
let unsavedChanges = false;

// Dual-mode state
let currentMode = localStorage.getItem('current_mode') || 'films'; // 'films' | 'cartoons'

// Per-mode stored credentials
const MODES = {
  films:    { token: null, path: null, db: null, films: [], affiches: {} },
  cartoons: { token: null, path: null, db: null, films: [], affiches: {} }
};
MODES.films.token    = localStorage.getItem('dbx_token_films') || null;
MODES.films.path     = localStorage.getItem('dbx_path_films')  || null;
MODES.cartoons.token = localStorage.getItem('dbx_token_cartoons') || null;
MODES.cartoons.path  = localStorage.getItem('dbx_path_cartoons')  || null;

// Active mode shortcut helpers
function m() { return MODES[currentMode]; }
function dropboxToken() { return m().token; }
function dropboxFilePath() { return m().path; }

const DBX_APP_KEY = 'pef9xz4yiaywon0';
const DBX_REDIRECT = location.href.split('?')[0].split('#')[0];

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
async function init() {
  SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });

  // Handle OAuth callback (token in URL hash) — includes which mode triggered it
  const hash = new URLSearchParams(location.hash.replace('#',''));
  const accessToken = hash.get('access_token');
  const oauthMode = hash.get('state') || 'films'; // we pass mode in state param
  if (accessToken) {
    MODES[oauthMode].token = accessToken;
    localStorage.setItem(`dbx_token_${oauthMode}`, accessToken);
    currentMode = oauthMode;
    localStorage.setItem('current_mode', currentMode);
    history.replaceState(null, '', location.pathname);
  }

  applyModeUI();
  updateAuthUI();

  // Auto-load file if already authenticated and path saved
  if (dropboxToken() && dropboxFilePath()) {
    document.getElementById('sync-bar').classList.add('hidden');
    await loadFileFromDropbox(dropboxFilePath());
  }
}

// ──────────────────────────────────────────────
// MODE SWITCH
// ──────────────────────────────────────────────
async function switchMode(mode) {
  if (mode === currentMode) return;

  // Save current DB state into current mode slot
  if (DB) {
    m().db = DB;
    m().films = [...allFilms];
    m().affiches = {...affiches};
  }

  currentMode = mode;
  localStorage.setItem('current_mode', mode);

  // Reset filters
  activeGenre = null;
  activeYear = null;
  activeSort = 'title';
  const btn = document.getElementById('btn-genre');
  if (btn) { btn.style.borderColor = ''; btn.style.color = ''; }
  const lbl = document.getElementById('btn-genre-label');
  if (lbl) lbl.textContent = 'Genere';
  const btnY = document.getElementById('btn-year');
  if (btnY) { btnY.style.borderColor = ''; btnY.style.color = ''; }
  const lblY = document.getElementById('btn-year-label');
  if (lblY) lblY.textContent = 'Anno';
  const btnS = document.getElementById('btn-sort');
  if (btnS) { btnS.style.borderColor = ''; btnS.style.color = ''; }
  const lblS = document.getElementById('btn-sort-label');
  if (lblS) lblS.textContent = 'A-Z';

  // Restore target mode state
  DB = m().db;
  allFilms = m().films || [];
  affiches = m().affiches || {};
  unsavedChanges = false;

  applyModeUI();
  updateAuthUI();

  if (DB) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fab').classList.remove('hidden');
    document.getElementById('sync-bar').classList.add('hidden');
    doSearch();
  } else if (dropboxToken() && dropboxFilePath()) {
    document.getElementById('sync-bar').classList.add('hidden');
    await loadFileFromDropbox(dropboxFilePath());
  } else {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loading').querySelector('p').textContent =
      `Connetti Dropbox per caricare i ${mode === 'films' ? 'film' : 'cartoon'}`;
    document.getElementById('fab').classList.add('hidden');
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('sync-bar').classList.remove('hidden');
  }
}

function applyModeUI() {
  const isFilms = currentMode === 'films';
  const isLight = document.documentElement.classList.contains('light');
  // Header logo
  document.getElementById('header-logo').innerHTML =
    isFilms ? 'MARCO\'S <span>FILMS</span>' : 'MARCO\'S <span style="color:#7eb8f7">CARTOON</span>';
  // Tab buttons
  document.getElementById('mode-films').classList.toggle('active', isFilms);
  document.getElementById('mode-cartoons').classList.toggle('active', !isFilms);
  // Count label
  document.getElementById('count-label').textContent = isFilms ? 'film' : 'cartoon';
  // Accent color — films=gold, cartoons=blue, adjusted per theme
  if (isFilms) {
    document.documentElement.style.setProperty('--accent', isLight ? '#c9a227' : '#e8c547');
    document.documentElement.style.setProperty('--accent2', isLight ? '#c96327' : '#e87547');
  } else {
    document.documentElement.style.setProperty('--accent', '#7eb8f7');
    document.documentElement.style.setProperty('--accent2', '#5a9fd4');
  }
  // Update count
  document.getElementById('count').textContent = allFilms.length;
}

// ──────────────────────────────────────────────
// DROPBOX AUTH
// ──────────────────────────────────────────────
function dropboxLogin() {
  const authUrl = `https://www.dropbox.com/oauth2/authorize`
    + `?client_id=${DBX_APP_KEY}`
    + `&response_type=token`
    + `&redirect_uri=${encodeURIComponent(DBX_REDIRECT)}`
    + `&state=${currentMode}`;
  location.href = authUrl;
}

function dropboxLogout() {
  m().token = null; m().path = null; m().db = null; m().films = []; m().affiches = {};
  localStorage.removeItem(`dbx_token_${currentMode}`);
  localStorage.removeItem(`dbx_path_${currentMode}`);
  DB = null; allFilms = []; affiches = {};
  document.getElementById('grid').innerHTML = '';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading').querySelector('p').textContent = 'Connetti Dropbox per caricare il database';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('btn-save').style.display = 'none';
  updateAuthUI();
  document.getElementById('sync-bar').classList.remove('hidden');
}

async function updateAuthUI() {
  if (dropboxToken()) {
    // Get user info
    try {
      const res = await fetch('https://api.dropboxapi.com/2/users/get_current_account', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${dropboxToken()}`, 'Content-Type': 'application/json' },
        body: 'null'
      });
      if (res.ok) {
        const u = await res.json();
        document.getElementById('dropbox-user').textContent = `${u.name.display_name}`;
      }
    } catch(e) {}
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dropbox-section').style.display = 'flex';
    if (dropboxFilePath()) {
      document.getElementById('btn-save').style.display = 'inline-flex';
    }
  } else {
    document.getElementById('auth-section').style.display = 'flex';
    document.getElementById('dropbox-section').style.display = 'none';
  }
}

// ──────────────────────────────────────────────
// DROPBOX FILE BROWSER (via API, no Chooser SDK)
// ──────────────────────────────────────────────
async function dropboxPickFile() {
  await openFolderBrowser('');
}

async function openFolderBrowser(folderPath) {
  setStatus('Lettura cartella...', '');
  try {
    const res = await fetch('https://api.dropboxapi.com/2/files/list_folder', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${dropboxToken()}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ path: folderPath, recursive: false })
    });
    if (!res.ok) throw new Error('Errore lettura Dropbox');
    const data = await res.json();
    setStatus('', '');
    showFileBrowser(folderPath, data.entries);
  } catch(e) {
    setStatus('' + e.message, 'err');
  }
}

function showFileBrowser(currentPath, entries) {
  entries.sort((a,b) => {
    if (a['.tag'] === b['.tag']) return a.name.localeCompare(b.name);
    return a['.tag'] === 'folder' ? -1 : 1;
  });

  const items = entries.map(e => {
    const icon = e['.tag'] === 'folder'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'
      : e.name.match(/\.(data|sqlite|db)$/)
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8c547" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
    const isSelectable = e['.tag'] === 'file' && e.name.match(/\.(data|sqlite|db)$/);
    const pathEsc = e.path_display.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const nameEsc = e.name.replace(/'/g,"\\'");
    const clickAction = e['.tag'] === 'folder'
      ? `openFolderBrowser('${pathEsc}'); closeBrowserModal();`
      : isSelectable
        ? `selectDropboxFile('${pathEsc}', '${nameEsc}'); closeBrowserModal();`
        : '';
    const style = isSelectable
      ? 'color:var(--accent);font-weight:500;cursor:pointer'
      : e['.tag'] === 'folder'
        ? 'cursor:pointer'
        : 'color:var(--muted);cursor:default';
    const hoverable = e['.tag'] === 'folder' || isSelectable;
    return `<div onclick="${clickAction}" style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;${style}" onmouseover="if(${hoverable})this.style.background='var(--surface)'" onmouseout="this.style.background=''"><span>${icon}</span><span>${e.name}</span></div>`;
  }).join('');

  const parentPath = currentPath.includes('/') ? currentPath.substring(0, currentPath.lastIndexOf('/')) : '';
  const backBtn = currentPath
    ? `<div onclick="openFolderBrowser('${parentPath}'); closeBrowserModal();" style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--accent)" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''"><span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg></span><span>Su (${parentPath || 'Root'})</span></div>`
    : '';

// ──────────────────────────────────────────────
// LOAD FILE FROM DROPBOX API
// ──────────────────────────────────────────────
async function loadFileFromDropbox(path) {
  setStatus('Download da Dropbox...', '');
  setProgress(15);
  try {
    const res = await fetch('https://content.dropboxapi.com/2/files/download', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${dropboxToken()}`,
        'Dropbox-API-Arg': JSON.stringify({ path })
      }
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error_summary || 'Errore download');
    }
    setProgress(65);
    const buf = await res.arrayBuffer();
    setProgress(88);
    loadDB(new Uint8Array(buf));
    setStatus('Database sincronizzato', 'ok');
    setProgress(100);
    setTimeout(() => setProgress(0), 800);
    document.getElementById('btn-save').style.display = 'inline-flex';
    updateAuthUI();
  } catch(e) {
    setStatus('' + e.message, 'err');
    setProgress(0);
    // Token might be expired
    if (e.message.includes('expired') || e.message.includes('invalid')) dropboxLogout();
  }
}

// ──────────────────────────────────────────────
// SAVE TO DROPBOX
// ──────────────────────────────────────────────
async function saveToDropbox() {
  if (!DB || !dropboxToken() || !dropboxFilePath()) {
    setStatus('Errore: nessun file associato', 'err'); return;
  }
  setStatus('Salvataggio su Dropbox...', '');
  setProgress(20);
  document.getElementById('btn-save').disabled = true;

  try {
    const data = DB.export();
    const blob = new Blob([data], { type: 'application/octet-stream' });

    const res = await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${dropboxToken()}`,
        'Content-Type': 'application/octet-stream',
        'Dropbox-API-Arg': JSON.stringify({
          path: dropboxFilePath(),
          mode: 'overwrite',
          autorename: false,
          mute: false
        })
      },
      body: blob
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error_summary || 'Upload fallito');
    }

    setProgress(100);
    setStatus('Salvato su Dropbox!', 'ok');
    unsavedChanges = false;
    updateSaveBtn();
    setTimeout(() => setProgress(0), 800);
  } catch(e) {
    setStatus('' + e.message, 'err');
    setProgress(0);
  }
  document.getElementById('btn-save').disabled = false;
}

function loadAffiches() {
  affiches = {};
  try {
    const res = DB.exec("SELECT IDFilm, Affiche FROM affiches");
    if (res.length) {
      res[0].values.forEach(([id, data]) => {
        if (data) {
          const bytes = new Uint8Array(data);
          const blob = new Blob([bytes], {type:'image/jpeg'});
          affiches[id] = URL.createObjectURL(blob);
        }
      });
    }
  } catch(e) { console.warn('Affiches error:', e); }
}

function loadFilms() {
  // Verifica colonne disponibili
  let hasBA = false;
  try {
    const cols = DB.exec("PRAGMA table_info(films)");
    if (cols.length) {
      const names = cols[0].values.map(r => r[1]);
      hasBA = names.includes('BAChemin') && names.includes('BAType');
    }
  } catch(e) {}

  const baFields = hasBA ? ', BAChemin, BAType' : '';
  const res = DB.exec(`SELECT ID, TitreVF, TitreVO, Genre, Annee, Duree, Note, Synopsis,
    Acteurs, Realisateurs, Support, Langues, SousTitres, Pays, Commentaires${baFields} FROM films`);
  if (!res.length) { allFilms = []; renderGrid([]); return; }
  allFilms = res[0].values.map(r => ({
    id: r[0], title: r[1] || '', titleOrig: r[2] || '', genre: r[3] || '',
    year: r[4] || '', duration: r[5] || '', rating: r[6] || '',
    synopsis: r[7] || '', actors: r[8] || '', directors: r[9] || '',
    support: r[10] || '', languages: r[11] || '', subtitles: r[12] || '',
    country: r[13] || '', comments: r[14] || '',
    trailer: hasBA ? (r[15] || '') : ''
  }));
  doSearch();
}

// ──────────────────────────────────────────────
// SEARCH & FILTER
// ──────────────────────────────────────────────
function doSearch() {
  if (!allFilms.length) return;
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sort = activeSort;

  let filtered = allFilms.filter(f => {
    // Genre filter
    if (activeGenre && !f.genre.split(/[\/,]/).map(g => g.trim()).includes(activeGenre)) return false;
    // Year filter
    if (activeYear && String(f.year) !== activeYear) return false;
    // Text search
    if (!q) return true;
    if (searchField === 'title') return f.title.toLowerCase().includes(q) || f.titleOrig.toLowerCase().includes(q);
    if (searchField === 'director') return f.directors.toLowerCase().includes(q);
    if (searchField === 'actor') return f.actors.toLowerCase().includes(q);
    if (searchField === 'genre') return f.genre.toLowerCase().includes(q);
    // all
    return f.title.toLowerCase().includes(q) || f.titleOrig.toLowerCase().includes(q)
      || f.directors.toLowerCase().includes(q) || f.actors.toLowerCase().includes(q)
      || f.genre.toLowerCase().includes(q);
  });

  filtered.sort((a, b) => {
    if (sort === 'title') return a.title.localeCompare(b.title);
    if (sort === 'year_desc') return (b.year||0) - (a.year||0);
    if (sort === 'year_asc') return (a.year||0) - (b.year||0);
    if (sort === 'rating') return (b.rating||0) - (a.rating||0);
    return 0;
  });

  document.getElementById('count').textContent = filtered.length;
  renderGrid(filtered);
}

        <label class="form-label">Synopsis</label>
        <textarea class="form-textarea" id="f-synopsis">${esc(v.synopsis||'')}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Paese</label>
          <input class="form-input" id="f-country" value="${esc(v.country||'')}">
        </div>
        <div class="form-group">
          <label class="form-label">Supporto</label>
          <input class="form-input" id="f-support" value="${esc(v.support||'')}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note personali</label>
        <textarea class="form-textarea" id="f-comments" style="min-height:50px">${esc(v.comments||'')}</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="saveFilm()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salva</button>
        ${f ? `<button class="btn secondary" onclick="openFilm(${f.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg> Indietro</button>` : ''}
        <button class="btn secondary" style="margin-left:auto" onclick="closeModal()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Annulla</button>
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function saveFilm() {
  const vals = {
    TitreVF: gv('f-title'), TitreVO: gv('f-titleOrig'),
    Annee: gv('f-year'), Duree: gv('f-duration'), Note: gv('f-rating'),
    Genre: gv('f-genre'), Realisateurs: gv('f-directors'), Acteurs: gv('f-actors'),
    Synopsis: gv('f-synopsis'), Pays: gv('f-country'), Support: gv('f-support'),
    Commentaires: gv('f-comments'), DateHeureMAJ: new Date().toISOString()
  };

  if (currentEditId) {
    const sets = Object.entries(vals).map(([k]) => `${k}=?`).join(',');
    DB.run(`UPDATE films SET ${sets} WHERE ID=?`, [...Object.values(vals), currentEditId]);
  } else {
    const keys = Object.keys(vals).join(',');
    const placeholders = Object.keys(vals).map(() => '?').join(',');
    DB.run(`INSERT INTO films (${keys}) VALUES (${placeholders})`, Object.values(vals));
  }
  unsavedChanges = true;
  updateSaveBtn();
  loadFilms();
  closeModal();
}

function deleteFilm(id) {
  if (!confirm('Eliminare questo film?')) return;
  DB.run('DELETE FROM films WHERE ID=?', [id]);
  DB.run('DELETE FROM affiches WHERE IDFilm=?', [id]);
  unsavedChanges = true;
  updateSaveBtn();
  loadFilms();
  closeModal();
}

function updateSaveBtn() {
  const btn = document.getElementById('btn-save');
  if (!btn) return;
  if (unsavedChanges) {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><line x1="12" y1="13" x2="12" y2="19"/><polyline points="9 16 12 19 15 16"/></svg> Salva su Dropbox ●';
    btn.style.background = 'var(--accent2)';
  } else {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><line x1="12" y1="13" x2="12" y2="19"/><polyline points="9 16 12 19 15 16"/></svg> Salva su Dropbox';
    btn.style.background = '';
  }
}

// ──────────────────────────────────────────────
// POSTER GALLERY
// ──────────────────────────────────────────────
const URL_REGEX = /https?:\/\/[^\s,;|]+/gi;

function buildCommentsSection(comments) {
  const allUrls = comments.match(URL_REGEX) || [];
  const imageUrls = allUrls;
  const text = comments.replace(URL_REGEX, '').replace(/[\s,;|]+/g, ' ').trim();

  let html = '';

  if (text) {
    html += `<div class="modal-section-title">Note personali</div>
             <div class="modal-people" style="color:var(--muted);margin-bottom:${imageUrls.length ? '12px' : '0'}">${esc(text)}</div>`;
  }

  if (imageUrls.length) {
    const thumbs = imageUrls.map((url, i) => {
      const safeUrl = esc(url);
      return `<img class="poster-thumb" src="${safeUrl}" alt="Poster ${i+1}"
                loading="lazy"
                onclick="openLightbox(${i})"
                onerror="this.outerHTML='<div class=\\'poster-thumb-error\\'>Immagine non disponibile</div>'">`;
    }).join('');

    html += `<div class="modal-section-title">${imageUrls.length > 1 ? 'Poster (' + imageUrls.length + ')' : 'Poster'}</div>
             <div class="poster-gallery" id="modal-gallery">${thumbs}</div>`;

    window._galleryUrls = imageUrls;
  }

  return html;
}

// ──────────────────────────────────────────────
// LIGHTBOX
// ──────────────────────────────────────────────
let _lbIndex = 0;

function openLightbox(index) {
  const urls = window._galleryUrls || [];
  if (!urls.length) return;
  _lbIndex = index;
  _showLightboxImage();
  document.getElementById('lightbox').classList.add('open');
  // Hide nav if only one image
  document.getElementById('lightbox-nav').style.display = urls.length > 1 ? 'flex' : 'none';
}

function _showLightboxImage() {
  const urls = window._galleryUrls || [];
  document.getElementById('lightbox-img').src = urls[_lbIndex];
  document.getElementById('lightbox-counter').textContent = `${_lbIndex + 1} / ${urls.length}`;
}

function lightboxStep(dir) {
  const urls = window._galleryUrls || [];
  _lbIndex = (_lbIndex + dir + urls.length) % urls.length;
  _showLightboxImage();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

function closeLightboxIfOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

// Swipe support on lightbox
(function() {
  let startX = 0;
  document.addEventListener('touchstart', e => {
    if (document.getElementById('lightbox').classList.contains('open'))
      startX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) lightboxStep(diff > 0 ? 1 : -1);
  }, { passive: true });
})();

function filterByDirector(name) {
  closeModal();
  const search = document.getElementById('search');
  search.value = name;
  searchField = 'director';
  doSearch();
}

// ──────────────────────────────────────────────
// MODAL UTILS
// ──────────────────────────────────────────────
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalIfOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ──────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function gv(id) { return document.getElementById(id)?.value || ''; }
function setStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  const icon = cls === 'ok'
    ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px"><polyline points="20 6 9 17 4 12"/></svg>'
    : cls === 'err'
    ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-right:5px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-right:5px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  el.innerHTML = msg ? icon + msg : '';
  el.className = cls;
}
function setProgress(p) {
  document.getElementById('progress-bar').style.width = p + '%';
}

// Chiude la tastiera toccando fuori dalla barra di ricerca
document.addEventListener('touchstart', function(e) {
  const search = document.getElementById('search');
  if (document.activeElement === search && !search.contains(e.target)) {
    search.blur();
  }
}, { passive: true });

// ──────────────────────────────────────────────
// THEME
// ──────────────────────────────────────────────
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('icon-dark').style.display = 'block';
    document.getElementById('icon-light').style.display = 'none';
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f4f2ee');
  } else {
    document.documentElement.classList.remove('light');
    document.getElementById('icon-dark').style.display = 'none';
    document.getElementById('icon-light').style.display = 'block';
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0a0a0f');
  }
}

function toggleTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const next = isLight ? 'dark' : 'light';
  localStorage.setItem('theme', next);
  applyTheme(next);
  applyModeUI();
}

// Apply saved theme immediately
applyTheme(localStorage.getItem('theme') || 'dark');

// ──────────────────────────────────────────────
// START
// ──────────────────────────────────────────────
init();
</script>
